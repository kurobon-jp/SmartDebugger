name: Octopus Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Run Octopus Review
        uses: octopusreview/action@v1
        with:
          # Public Repoなら不要
          # Private Repoの場合のみ設定
          octopus-api-key: ${{ secrets.OCTOPUS_API_KEY }}

          # 日本語レビュー
          review-language: "ja"

          # Unity/C#向けチューニング
          extra-instructions: |
            すべてのレビューコメントを日本語で出力してください。

            レビューは簡潔にしてください。
            重大な問題を優先してください。

            以下を重点的に確認:
            - NullReferenceException の可能性
            - GC Alloc
            - Update/LateUpdate/FixedUpdate内の重い処理
            - LINQ多用
            - foreach boxing
            - async/await の例外処理
            - async void
            - UniTaskの誤用
            - IDisposable/NativeArray の Dispose漏れ
            - Addressables誤用
            - Unity main thread問題
            - ScriptableObject誤用
            - イベント購読解除漏れ
            - メモリリーク
            - パフォーマンス問題
            - マルチスレッド問題
            - URP互換性
            - Shader負荷

            以下は指摘しない:
            - 命名スタイル
            - コメント不足
            - 個人の好みレベルの設計
            - 過剰なリファクタ提案
            - 小さなコードスタイル
            - var使用有無
            - 改行位置
            - インデント
            - using順
            - trivialな最適化

            Unity特有の問題を優先してください。

            明確な問題のみ指摘してください。
            推測ベースの指摘は避けてください。